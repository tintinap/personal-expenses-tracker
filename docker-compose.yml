services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: expense_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expense_password}
      POSTGRES_DB: ${POSTGRES_DB:-expense_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense_user} -d ${POSTGRES_DB:-expense_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # NestJS Backend API (port 3000)
  # Runs Prisma migrations on startup.
  # ──────────────────────────────────────────────
  api:
    build: ./apps/api
    container_name: expense_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-expense_user}:${POSTGRES_PASSWORD:-expense_password}@db:5432/${POSTGRES_DB:-expense_db}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Next.js Web App (port 3001)
  # ──────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://api:3000
    container_name: expense_web
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
    depends_on:
      - api
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Flutter Mobile Web (port 8080) — optional
  # Build with: docker compose --profile mobile up
  # ──────────────────────────────────────────────
  mobile-web:
    build: ./apps/mobile
    container_name: expense_mobile_web
    ports:
      - "8080:80"
    profiles:
      - mobile
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
